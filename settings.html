<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrigonumTrade — Settings (Account, Security, Notifications)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy-900: #0D0D24;
  --navy-800: #161638;
  --navy-700: #1C1C45;
  --navy-600: #25254F;
  --navy-500: #3F3F8A;
  --cyan:   #12CCFF;
  --purple: #AF33FF;
  --green:  #00E68A;
  --red:    #FF4D6A;
  --amber:  #FFB020;
  --white-92: rgba(255,255,255,0.92);
  --white-75: rgba(255,255,255,0.75);
  --white-55: rgba(255,255,255,0.55);
  --white-35: rgba(255,255,255,0.35);
  --white-15: rgba(255,255,255,0.15);
  --white-08: rgba(255,255,255,0.08);
  --white-05: rgba(255,255,255,0.05);
  --white-03: rgba(255,255,255,0.03);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.15);
  --card-gradient: linear-gradient(135deg, rgba(28,28,69,0.9), rgba(22,22,56,0.95));
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--navy-900);
  color: var(--white-92);
  min-height: 100vh;
}

/*
 * SETTINGS PAGE — Uses AppLayout (sidebar + main content)
 * Route: /settings (tabs route to sub-pages)
 * Sub-routes: /settings (Account), /settings/security, /settings/notifications
 * Uses tab navigation at top, content below.
 * Auth required.
 */

.app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px;
  background: var(--navy-800);
  border-right: 1px solid var(--white-08);
  padding: 24px 0;
  flex-shrink: 0;
}

.main-content {
  flex: 1;
  padding: 28px 32px;
  overflow-y: auto;
  max-height: 100vh;
}

/* Page header */
.page-title {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 24px;
}

/* Settings tabs */
.settings-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--white-08);
  margin-bottom: 32px;
}

.settings-tab {
  padding: 12px 24px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--white-55);
  background: none;
  border: none;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}
.settings-tab:hover { color: var(--white-75); }
.settings-tab.active {
  color: var(--white-92);
}
.settings-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 24px;
  right: 24px;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
}

/* ---- ACCOUNT TAB ---- */
.settings-section {
  max-width: 600px;
}

.card {
  background: var(--card-gradient);
  border: 1px solid var(--white-08);
  border-radius: var(--r-lg);
  padding: 24px;
  box-shadow: var(--shadow-card);
  margin-bottom: 24px;
}

.card-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 20px;
}

.field-group {
  margin-bottom: 20px;
}

.field-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--white-55);
  margin-bottom: 6px;
  display: block;
}

.field-value {
  font-size: 14px;
  color: var(--white-75);
  padding: 10px 0;
}

.input-field {
  background: var(--white-05);
  border: 1px solid var(--white-15);
  border-radius: var(--r-md);
  padding: 10px 16px;
  color: var(--white-92);
  font-size: 13px;
  width: 100%;
  transition: border-color 0.2s;
}
.input-field:focus {
  outline: none;
  border-color: var(--cyan);
}

.btn-primary {
  background: var(--cyan);
  color: var(--navy-900);
  border: none;
  border-radius: var(--r-md);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.btn-secondary {
  background: transparent;
  color: var(--white-75);
  border: 1px solid var(--white-15);
  border-radius: var(--r-md);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.btn-danger {
  background: transparent;
  color: var(--red);
  border: 1px solid rgba(255,77,106,0.3);
  border-radius: var(--r-md);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

/* Toggle switch row */
.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid var(--white-05);
}
.toggle-row:last-child {
  border-bottom: none;
}

.toggle-info {
  flex: 1;
}
.toggle-title {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 2px;
}
.toggle-desc {
  font-size: 12px;
  color: var(--white-55);
}

/* Simple toggle switch */
.toggle-switch {
  width: 44px;
  height: 24px;
  background: var(--white-15);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
  margin-left: 16px;
}
.toggle-switch.active {
  background: var(--cyan);
}
.toggle-switch::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: white;
  transition: transform 0.2s;
}
.toggle-switch.active::after {
  transform: translateX(20px);
}

/* Role badge */
.role-badge {
  display: inline-block;
  padding: 4px 12px;
  background: rgba(18,204,255,0.15);
  color: var(--cyan);
  border-radius: 9999px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}
</style>
