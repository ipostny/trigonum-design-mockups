<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrigonumTrade — Balance (Review, Transactions, Allocation)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared-tokens.css">
<style>
:root {
  --navy-900: #0D0D24;
  --navy-800: #161638;
  --navy-700: #1C1C45;
  --navy-600: #25254F;
  --cyan:   #12CCFF;
  --purple: #AF33FF;
  --green:  #00E68A;
  --red:    #FF4D6A;
  --amber:  #FFB020;
  --white-92: rgba(255,255,255,0.92);
  --white-75: rgba(255,255,255,0.75);
  --white-55: rgba(255,255,255,0.55);
  --white-35: rgba(255,255,255,0.35);
  --white-15: rgba(255,255,255,0.15);
  --white-08: rgba(255,255,255,0.08);
  --white-05: rgba(255,255,255,0.05);
  --white-03: rgba(255,255,255,0.03);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-full: 9999px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.15);
  --card-gradient: linear-gradient(135deg, rgba(28,28,69,0.9), rgba(22,22,56,0.95));
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--navy-900);
  color: var(--white-92);
  min-height: 100vh;
}

/*
 * BALANCE PAGE — Financial overview with 3 sub-tabs
 * Route: /balance (tabs: Review, Transactions, Allocation)
 * Auth required. Uses AppLayout.
 * v1 uses SidebarLayout — v2 uses top tabs instead.
 *
 * Sub-pages:
 * - Review: Balance overview with deposit/withdraw wallet addresses
 * - Transactions: History of transfers, deposits, withdrawals
 * - Allocation: Pie chart of asset distribution across accounts
 */

.app-shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px;
  background: var(--navy-800);
  border-right: 1px solid var(--white-08);
  padding: 24px 0;
  flex-shrink: 0;
}
.main-content {
  flex: 1;
  padding: 28px 32px;
  overflow-y: auto;
  max-height: 100vh;
}

.page-title {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 24px;
}

/* Tabs */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--white-08);
  margin-bottom: 28px;
}
.tab-btn {
  padding: 12px 24px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--white-55);
  background: none;
  border: none;
  cursor: pointer;
  position: relative;
}
.tab-btn:hover { color: var(--white-75); }
.tab-btn.active { color: var(--white-92); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 24px;
  right: 24px;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
}

.card {
  background: var(--card-gradient);
  border: 1px solid var(--white-08);
  border-radius: var(--r-lg);
  padding: 24px;
  box-shadow: var(--shadow-card);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: -15px; right: -15px;
  width: 0; height: 0;
  border-left: 40px solid transparent;
  border-right: 40px solid transparent;
  border-bottom: 70px solid var(--white-03);
  transform: rotate(15deg);
  pointer-events: none;
}

.stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--white-55);
  margin-bottom: 6px;
}
.stat-value {
  font-size: 28px;
  font-weight: 800;
}

/* ---- REVIEW TAB ---- */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

/* Addresses section */
.addresses-card {
  margin-top: 24px;
}
.card-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 20px;
}

.address-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--white-05);
}
.address-row:last-child { border-bottom: none; }

.address-coin {
  display: flex;
  align-items: center;
  gap: 12px;
}
.coin-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--white-08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
}
.coin-name {
  font-size: 14px;
  font-weight: 600;
}
.coin-network {
  font-size: 11px;
  color: var(--white-55);
}

.address-value {
  font-size: 12px;
  font-family: monospace;
  color: var(--white-55);
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.btn-copy {
  background: var(--white-08);
  border: 1px solid var(--white-15);
  border-radius: var(--r-sm);
  padding: 6px 12px;
  color: var(--white-75);
  font-size: 11px;
  cursor: pointer;
}

/* ---- TRANSACTIONS TAB ---- */
.table-card {
  padding: 0;
  overflow: hidden;
}

.data-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}
.data-table th {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--white-55);
  padding: 14px 16px;
  text-align: left;
  border-bottom: 1px solid var(--white-08);
  background: var(--white-03);
}
.data-table td {
  font-size: 13px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--white-05);
  color: var(--white-75);
}
.data-table tr:hover td { background: var(--white-03); }

.type-deposit { color: var(--green); font-weight: 600; }
.type-withdrawal { color: var(--red); font-weight: 600; }
.type-transfer { color: var(--cyan); font-weight: 600; }

/* ---- ALLOCATION TAB ---- */
.allocation-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.donut-placeholder {
  height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white-35);
  font-size: 13px;
}

.allocation-list {
  padding: 0;
}
.allocation-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--white-05);
}
.allocation-item:last-child { border-bottom: none; }

.alloc-asset {
  display: flex;
  align-items: center;
  gap: 10px;
}
.alloc-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.alloc-name { font-size: 14px; font-weight: 500; }
.alloc-pct { font-size: 14px; font-weight: 600; }
.alloc-amount { font-size: 12px; color: var(--white-55); }
</style>
