<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gridstack v12 - Dynamic Margin Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@12/dist/gridstack.min.css">
  <script src="https://cdn.jsdelivr.net/npm/gridstack@12/dist/gridstack-all.js"></script>
  <style>
    body { font-family: monospace; margin: 16px; background: #1a1a1a; color: #eee; }
    button { margin: 4px; padding: 8px 16px; font-family: monospace; font-size: 14px; cursor: pointer; background: #333; color: #eee; border: 1px solid #666; border-radius: 4px; }
    button:hover { background: #555; }
    pre#log { background: #111; padding: 12px; max-height: 200px; overflow-y: auto; font-size: 12px; border: 1px solid #333; }
    #computed { background: #111; padding: 12px; font-size: 12px; border: 1px solid #333; white-space: pre; }
    /* Card styling — NOTE: we do NOT set position:relative here */
    .grid-stack > .grid-stack-item > .grid-stack-item-content {
      background: #e53935; border-radius: 8px; display: flex;
      align-items: center; justify-content: center;
      font-size: 18px; font-weight: bold; color: #fff;
    }
    .grid-stack > .grid-stack-item:nth-child(2) > .grid-stack-item-content { background: #1e88e5; }
    .grid-stack > .grid-stack-item:nth-child(3) > .grid-stack-item-content { background: #43a047; }
    .grid-stack > .grid-stack-item:nth-child(4) > .grid-stack-item-content { background: #fb8c00; }
  </style>
</head>
<body>
  <h2>Gridstack v12 — Dynamic Margin Test</h2>
  <p>Initial margin: <b>8</b>. Click buttons to change gap between cards.</p>

  <div>
    <button onclick="setMargin(0)">Gap: 0px</button>
    <button onclick="setMargin(4)">Gap: 4px</button>
    <button onclick="setMargin(8)" style="background:#555;border-color:#999;">Gap: 8px (default)</button>
    <button onclick="setMargin(16)">Gap: 16px</button>
    <button onclick="setMargin(24)">Gap: 24px</button>
    <button onclick="setMargin(40)">Gap: 40px</button>
  </div>

  <div class="grid-stack" id="gs">
    <div class="grid-stack-item" gs-x="0" gs-y="0" gs-w="8" gs-h="3">
      <div class="grid-stack-item-content">8×3 Card A</div>
    </div>
    <div class="grid-stack-item" gs-x="8" gs-y="0" gs-w="4" gs-h="3">
      <div class="grid-stack-item-content">4×3 Card B</div>
    </div>
    <div class="grid-stack-item" gs-x="0" gs-y="3" gs-w="4" gs-h="3">
      <div class="grid-stack-item-content">4×3 Card C</div>
    </div>
    <div class="grid-stack-item" gs-x="4" gs-y="3" gs-w="8" gs-h="3">
      <div class="grid-stack-item-content">8×3 Card D</div>
    </div>
  </div>

  <h3>Computed styles on first .grid-stack-item-content</h3>
  <div id="computed">waiting...</div>

  <h3>Log</h3>
  <pre id="log"></pre>

<script>
const logEl = document.getElementById('log');
function log(msg) {
  logEl.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

var grid = GridStack.init({
  column: 12, cellHeight: 80, margin: 8,
  disableResize: true, disableDrag: true
}, '#gs');

log('Grid initialized with margin=8');

function setMargin(px) {
  log('Setting margin to ' + px + 'px via grid.margin()');
  grid.margin(px);
  log('Done. Check visual gap between cards.');
}

// Computed style monitor
setInterval(function() {
  var item = document.querySelector('.grid-stack-item-content');
  if (!item) { document.getElementById('computed').textContent = 'No element found'; return; }
  var cs = getComputedStyle(item);
  document.getElementById('computed').textContent =
    'position: ' + cs.position +
    '\ntop:      ' + cs.top +
    '\nright:    ' + cs.right +
    '\nbottom:   ' + cs.bottom +
    '\nleft:     ' + cs.left +
    '\n\nCSS vars on .grid-stack:' +
    '\n  --gs-item-margin-top:    ' + getComputedStyle(document.getElementById('gs')).getPropertyValue('--gs-item-margin-top') +
    '\n  --gs-item-margin-right:  ' + getComputedStyle(document.getElementById('gs')).getPropertyValue('--gs-item-margin-right') +
    '\n  --gs-item-margin-bottom: ' + getComputedStyle(document.getElementById('gs')).getPropertyValue('--gs-item-margin-bottom') +
    '\n  --gs-item-margin-left:   ' + getComputedStyle(document.getElementById('gs')).getPropertyValue('--gs-item-margin-left');
}, 500);
</script>
</body>
</html>
